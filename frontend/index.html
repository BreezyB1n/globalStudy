<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GlobalStudy AI</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">GlobalStudy AI</p>
        <h1>硕士项目咨询 Demo 基础骨架</h1>
        <p class="summary">
          当前阶段只验证服务启动、静态托管、健康检查和统一错误处理，
          后续问答、采集和知识库能力将在此基础上继续接入。
        </p>
      </section>

      <section class="panel">
        <h2>系统状态</h2>
        <dl class="status-grid">
          <div>
            <dt>后端健康检查</dt>
            <dd data-health-value>Checking...</dd>
          </div>
          <div>
            <dt>当前环境</dt>
            <dd data-env-value>Loading...</dd>
          </div>
        </dl>
      </section>
    </main>

    <script src="/assets/app.js"></script>
  </body>
</html>
